# Render Blueprint — deploys ORKXTRA as a Node web service.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: orkxtra
    runtime: node
    plan: free
    region: oregon                 # or: singapore / frankfurt — pick what's closest
    buildCommand: "npm install"     # no dependencies, so this is instant
    startCommand: "node web-player/server.js"
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # REQUIRED: the app defaults to 127.0.0.1; a cloud host must bind all interfaces.
      - key: HOST
        value: "0.0.0.0"
      # Node 22+ (needed for the built-in node:sqlite).
      - key: NODE_VERSION
        value: "22"
      # Keep the SSRF guard on (blocks private/LAN targets). Public IPTV portals are fine.
      - key: ALLOW_PRIVATE_REMOTE
        value: "0"

      # Public site origin — used to build Stripe return URLs.
      - key: APP_URL
        value: "https://orkxtra.onrender.com"

      # ---- Stripe ("Upgrade to Pro" checkout) ----
      # The price id is a PUBLIC identifier (safe to commit).
      - key: STRIPE_PRICE_ID
        value: "price_1TdaS6KYrqeWcIx3rHDolixn"
      # SECRETS — never committed. sync:false makes Render prompt for them in the
      # dashboard (Environment tab). Paste the values there yourself:
      #   STRIPE_SECRET_KEY      -> sk_test_... or sk_live_...
      #   STRIPE_WEBHOOK_SECRET  -> whsec_... (from the webhook you create in Stripe)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
